# Uniting CRM docker-compose
# Deployed via Dokploy — Traefik labels are managed by Dokploy

x-customizable-image: &customizable_image
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: unless-stopped

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:
  configurator:
    <<: *backend_defaults
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host db;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  create-site:
    <<: *backend_defaults
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for configurator...";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "Could not find configurator! Exiting...";
            exit 1;
          fi
        done;
        echo "Configurator found";
        if [[ ! -f sites/${SITE_NAME:-crm.localhost}/site_config.json ]]; then
          echo "Creating site ${SITE_NAME:-crm.localhost}...";
          bench new-site ${SITE_NAME:-crm.localhost} \
            --mariadb-root-password ${DB_PASSWORD:-frappe123} \
            --admin-password ${ADMIN_PASSWORD:-admin} \
            --install-app crm;
          bench --site ${SITE_NAME:-crm.localhost} set-config host_name "https://${SITE_NAME:-crm.localhost}";
          bench setup nginx --yes;
        else
          echo "Site ${SITE_NAME:-crm.localhost} already exists. Skipping creation.";
          bench --site ${SITE_NAME:-crm.localhost} migrate;
        fi
    environment:
      SITE_NAME: ${SITE_NAME:-crm.localhost}
      DB_PASSWORD: ${DB_PASSWORD:-frappe123}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    restart: "no"

  backend:
    <<: *backend_defaults

  main-app:
    <<: *customizable_image
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-crm.localhost}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket
    networks:
      - default
      - dokploy-network

  websocket:
    <<: [*depends_on_configurator, *customizable_image]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    command: bench schedule

  db:
    image: mariadb:10.6
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-frappe123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  db-data:
  sites:

networks:
  dokploy-network:
    external: true
